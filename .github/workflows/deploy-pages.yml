name: Déployer Maison Novia sur GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v5

      - name: Installer Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          package-manager-cache: false

      - name: Installer les dépendances
        run: npm install

      - name: Construire le site pour maisonnovia.fr
        run: npm run build

      - name: Envoyer le site construit
        uses: actions/upload-pages-artifact@v5
        with:
          path: "./out"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Publier sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
